<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">日常单书结构图</title>
  <desc id="desc">book.adoc include 前言、章节、附录和参考资料。</desc>
  <rect width="720" height="220" fill="#f8fafc"/>
  <g fill="#ffffff" stroke="#334155" stroke-width="2">
    <rect x="40" y="70" width="130" height="70" rx="6"/>
    <rect x="220" y="30" width="130" height="55" rx="6"/>
    <rect x="220" y="100" width="130" height="55" rx="6"/>
    <rect x="400" y="70" width="130" height="70" rx="6"/>
    <rect x="580" y="70" width="100" height="70" rx="6"/>
  </g>
  <g fill="#0f172a" font-family="sans-serif" font-size="16" text-anchor="middle">
    <text x="105" y="112">book.adoc</text>
    <text x="285" y="63">frontmatter</text>
    <text x="285" y="133">chapters</text>
    <text x="465" y="112">backmatter</text>
    <text x="630" y="112">assets</text>
  </g>
  <g stroke="#0f766e" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M170 96 L220 58"/>
    <path d="M170 116 L220 128"/>
    <path d="M350 128 L400 112"/>
    <path d="M530 105 L580 105"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
  </defs>
</svg>
