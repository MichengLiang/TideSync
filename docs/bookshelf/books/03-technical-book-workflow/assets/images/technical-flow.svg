<svg xmlns="http://www.w3.org/2000/svg" width="760" height="240" viewBox="0 0 760 240" role="img" aria-labelledby="title desc">
  <title id="title">技术书流程图</title>
  <desc id="desc">技术书从章节引用书内代码、书内图片和共享图片。</desc>
  <rect width="760" height="240" fill="#f8fafc"/>
  <g fill="#ffffff" stroke="#334155" stroke-width="2">
    <rect x="40" y="85" width="140" height="70" rx="6"/>
    <rect x="250" y="85" width="140" height="70" rx="6"/>
    <rect x="470" y="30" width="140" height="55" rx="6"/>
    <rect x="470" y="105" width="140" height="55" rx="6"/>
    <rect x="470" y="180" width="140" height="40" rx="6"/>
  </g>
  <g fill="#0f172a" font-family="sans-serif" font-size="15" text-anchor="middle">
    <text x="110" y="126">book.adoc</text>
    <text x="320" y="126">chapters</text>
    <text x="540" y="63">examples</text>
    <text x="540" y="138">assets</text>
    <text x="540" y="205">shared</text>
  </g>
  <g stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M180 120 L250 120"/>
    <path d="M390 105 L470 58"/>
    <path d="M390 125 L470 132"/>
    <path d="M390 145 L470 198"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
