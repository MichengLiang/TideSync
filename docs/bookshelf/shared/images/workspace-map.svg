<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">多本书工作区结构</title>
  <desc id="desc">根工作区提供依赖、总目录和构建脚本，多个独立 book 位于 books 目录下。</desc>
  <rect width="720" height="260" fill="#f8fafc"/>
  <rect x="32" y="32" width="656" height="196" rx="6" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="56" y="68" font-family="sans-serif" font-size="22" fill="#0f172a">workspace</text>
  <rect x="56" y="96" width="150" height="88" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="82" y="132" font-family="sans-serif" font-size="16" fill="#1e3a8a">catalog.adoc</text>
  <text x="84" y="158" font-family="sans-serif" font-size="13" fill="#1e40af">书目入口</text>
  <rect x="286" y="96" width="150" height="88" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="318" y="132" font-family="sans-serif" font-size="16" fill="#14532d">books/</text>
  <text x="312" y="158" font-family="sans-serif" font-size="13" fill="#166534">多个 book.adoc</text>
  <rect x="516" y="96" width="150" height="88" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="546" y="132" font-family="sans-serif" font-size="16" fill="#78350f">shared/</text>
  <text x="544" y="158" font-family="sans-serif" font-size="13" fill="#92400e">共享属性与图片</text>
  <path d="M206 140 H286" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M436 140 H516" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
